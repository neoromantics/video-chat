apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/neoromantics/video-chat-frontend:latest
        ports:
        - containerPort: 3000
        env:
        - name: NUXT_PUBLIC_TURN_USERNAME
          valueFrom:
            secretKeyRef:
              name: chat-secrets
              key: turn-username
        - name: NUXT_PUBLIC_TURN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: chat-secrets
              key: turn-password
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  selector:
    app: frontend
  ports:
  - port: 3000
    targetPort: 3000
