services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    command: >
      sh -c "redis-server --requirepass ${REDIS_PASSWORD} --user ${REDIS_USER} on >${REDIS_PASSWORD} ~* +@all"

  coturn:
    image: coturn/coturn
    ports:
      - "3478:3478"
      - "3478:3478/udp"
    command: 
      - "--lt-cred-mech"
      - "--fingerprint"
      - "--user=${TURN_USERNAME}:${TURN_PASSWORD}"
      - "--realm=vcm-51101.vm.duke.edu"
      - "--log-file=stdout"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=redis:6379
      - REDIS_USER=${REDIS_USER}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      - redis
